services:
  app:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    command: sh -c "npm run server & npm run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
